# --- MangoWM Configuration ---
# Replicated from Sway config

# Appearance
border_width=0
gaps=0
opacity=1.0
animations=0
layout=dwindle

# Input (Global)
xkb_rules_layout=us,gr
xkb_rules_options=grp:toggle

# Input Rules (Specific devices)
input_rule {
    name = "*"
    natural_scroll = 1
}

# --- Binds ---
# Modifiers: SUPER, SHIFT, CTRL, ALT

# Move focus (Vim keys)
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# Move window (Vim keys)
bind=SUPER+SHIFT,h,movewindow,movetodir,left
bind=SUPER+SHIFT,l,movewindow,movetodir,right
bind=SUPER+SHIFT,k,movewindow,movetodir,up
bind=SUPER+SHIFT,j,movewindow,movetodir,down

# Tags (Workspaces)
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5

# Move window to tag
bind=SUPER+SHIFT,1,movetotag,1
bind=SUPER+SHIFT,2,movetotag,2
bind=SUPER+SHIFT,3,movetotag,3
bind=SUPER+SHIFT,4,movetotag,4
bind=SUPER+SHIFT,5,movetotag,5

# Apps & Utils
bind=SUPER,q,killclient
bind=SUPER,b,spawn,helium-browser
bind=SUPER,Return,spawn,foot
bind=SUPER,f,spawn,foot yazi
bind=SUPER,n,spawn,foot bluetui
bind=SUPER+SHIFT,n,spawn,foot wiremix
bind=SUPER,space,spawn,fuzzel -I
bind=SUPER,m,spawn,localsend
bind=SUPER,s,spawn,spotify
bind=SUPER+SHIFT,f,togglefullscreen
bind=SUPER+SHIFT,t,togglefloating

# Monitor Power
bind=SUPER,o,spawn,sh -c "wlopm --off *"
bind=SUPER+SHIFT,o,spawn,sh -c "wlopm --on *"

# System Power
bind=SUPER,Escape,spawn,systemctl suspend
bind=SUPER+SHIFT,Escape,spawn,shutdown now

# Mouse Binds
bindmouse=SUPER,1,movemouse,
bindmouse=SUPER,3,resizemouse,

# Volume
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 3%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 3%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Screenshots
bind=SUPER,p,spawn,sh -c "grim -g \"\$(slurp)\" - | wl-copy"
bind=SUPER+SHIFT,p,spawn,sh -c "grim ~/Desktop/\$(date +'%Y-%m-%d-%H%M%S_grim.png')"

# Clipboard History
bind=SUPER+SHIFT,v,spawn,sh -c "cliphist list | fuzzel --dmenu | cliphist decode | wl-copy"

# Convenience wtype shortcuts
bind=SUPER,c,spawn,wtype -M ctrl -k Insert -m ctrl
bind=SUPER,v,spawn,wtype -M shift -k Insert -m shift
bind=SUPER,a,spawn,wtype -M ctrl -k a -m ctrl
bind=SUPER,w,spawn,wtype -M ctrl -k w -m ctrl
bind=SUPER,BackSpace,spawn,wtype -M ctrl -k u -m ctrl

# Config reload
bind=SUPER,r,reload_config,
